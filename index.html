<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unificador de Productos y Colores</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        .upload-section {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #eef2f5;
            border-radius: 6px;
        }
        .file-box { flex: 1; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="file"] { width: 100%; }
        .btn-process {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-process:hover { background-color: #219653; }
        .btn-export {
            display: none;
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-export:hover { background-color: #1c5980; }
        .table-container {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
        }
        .status { margin-top: 10px; font-weight: bold; text-align: center; color: #d35400; }
    </style>
</head>
<body>

<div class="container">
    <h2>Unificador de Planillas (Productos + Colores)</h2>
    
    <div class="upload-section">
        <div class="file-box">
            <label for="fileProductos">1. Planilla de Productos (Precios y Talles)</label>
            <input type="file" id="fileProductos" accept=".xlsx, .xls, .csv">
        </div>
        <div class="file-box">
            <label for="fileColores">2. Planilla de Colores</label>
            <input type="file" id="fileColores" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button class="btn-process" onclick="procesarDatos()">Procesar y Unificar</button>
    <div id="status" class="status"></div>

    <button id="btnExport" class="btn-export" onclick="exportarCSV()">Descargar Resultado (CSV)</button>

    <div class="table-container" id="tableContainer">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Cód. Color</th>
                    <th>Color</th>
                    <th>Talle</th>
                    <th>Precio (FOB)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let productosData = [];
    let coloresData = [];
    let resultadoFinal = [];

    // Función genérica para leer archivos Excel usando SheetJS
    function leerExcel(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // Convertir la hoja a un array de objetos (JSON)
                const json = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
                resolve(json);
            };
            reader.onerror = (error) => reject(error);
            reader.readAsArrayBuffer(file);
        });
    }

    async function procesarDatos() {
        const fileProdInput = document.getElementById('fileProductos').files[0];
        const fileColInput = document.getElementById('fileColores').files[0];
        const statusDiv = document.getElementById('status');

        if (!fileProdInput || !fileColInput) {
            statusDiv.innerText = "Por favor, carga ambas planillas primero.";
            return;
        }

        statusDiv.innerText = "Leyendo archivos...";
        
        try {
            productosData = await leerExcel(fileProdInput);
            coloresData = await leerExcel(fileColInput);
            
            resultadoFinal = [];

            // Procesar cada producto
            productosData.forEach(prod => {
                // Adaptar a los nombres exactos de las columnas de tus imágenes
                let codProd = prod["Cod"] || prod["Código"] || prod["Codigo"];
                let descripcionProd = prod["Descriptions"] || prod["Descripción"];
                let tallesString = prod["Sizes"] || prod["Talles"];
                let precio = prod["FOB Dollar"] || prod["Precio"];

                if (!codProd) return; // Si hay una fila vacía, saltarla

                // 1. Encontrar todos los colores para este código
                let coloresDisponibles = coloresData.filter(c => c["Referencia"] == codProd || c["Cod"] == codProd);

                // 2. Separar los talles por el guion y limpiar espacios en blanco
                let tallesArray = tallesString ? tallesString.toString().split('-').map(t => t.trim()) : ["Único"];

                // Si no hay colores especificados para ese código en la tabla 2, agregamos una fila base para no perder el producto
                if (coloresDisponibles.length === 0) {
                    tallesArray.forEach(talle => {
                        resultadoFinal.push({
                            codigo: codProd,
                            producto: descripcionProd,
                            codColor: "N/A",
                            colorDesc: "N/A",
                            talle: talle,
                            precio: precio
                        });
                    });
                } else {
                    // 3. Multiplicar las filas: Por cada color, crear una fila por cada talle
                    coloresDisponibles.forEach(colorItem => {
                        let codColor = colorItem["Color"];
                        let colorDesc = colorItem["Description"];

                        tallesArray.forEach(talle => {
                            resultadoFinal.push({
                                codigo: codProd,
                                producto: descripcionProd,
                                codColor: codColor,
                                colorDesc: colorDesc,
                                talle: talle,
                                precio: precio
                            });
                        });
                    });
                }
            });

            dibujarTabla();
            statusDiv.innerText = `¡Proceso exitoso! Se generaron ${resultadoFinal.length} filas combinadas.`;
            document.getElementById('btnExport').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'block';

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Hubo un error al leer los archivos. Verifica que no estén dañados.";
        }
    }

    function dibujarTabla() {
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = ''; // Limpiar tabla anterior
        
        // Mostrar solo los primeros 100 resultados en pantalla para no saturar el navegador
        const mostrar = resultadoFinal.slice(0, 100); 

        mostrar.forEach(fila => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${fila.codigo}</td>
                <td>${fila.producto}</td>
                <td>${fila.codColor}</td>
                <td>${fila.colorDesc}</td>
                <td>${fila.talle}</td>
                <td>${fila.precio}</td>
            `;
            tbody.appendChild(tr);
        });
        
        if (resultadoFinal.length > 100) {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="6">...y ${resultadoFinal.length - 100} filas más. (Exporta para ver todo)</td>`;
            tbody.appendChild(tr);
        }
    }

    // Exportar el resultado usando separador de punto y coma (;)
    function exportarCSV() {
        if (resultadoFinal.length === 0) return;

        let csvContent = "\uFEFF"; // BOM para caracteres especiales y acentos
        // Cabeceras
        csvContent += "Codigo;Producto;Cod_Color;Color;Talle;Precio\n";

        resultadoFinal.forEach(fila => {
            // Asegurar que si hay precios con comas (ej. 2,48) o puntos, no rompan el CSV
            // Se envuelven en comillas dobles
            let precio = `"${fila.precio}"`;
            let row = `${fila.codigo};${fila.producto};${fila.codColor};${fila.colorDesc};${fila.talle};${precio}`;
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "Inventario_Unificado.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
